mode: ContinuousDeployment
assembly-versioning-scheme: MajorMinorPatch
assembly-informational-format: '{MajorMinorPatch}-{EscapedBranchName}.{VersionSourceDistance}'
increment: Patch

branches:
  main:
    regex: ^main$
    label: 'main'

  unknown:
    regex: ^(?<BranchName>.+)$  
    label: '{BranchName}'